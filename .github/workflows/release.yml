name: Build and Release

on:
  push:
      tags:
            - 'v*'
              workflow_dispatch:
                  inputs:
                        version:
                                description: 'Release version (e.g., 1.0.4)'
                                        required: true
                                                default: '1.0.4'

                                                jobs:
                                                  build:
                                                      runs-on: ubuntu-latest
                                                          strategy:
                                                                matrix:
                                                                        goos: [linux, darwin, windows]
                                                                                goarch: [amd64, arm64]
                                                                                        exclude:
                                                                                                  - goos: windows
                                                                                                              goarch: arm64
                                                                                                              
                                                                                                                  steps:
                                                                                                                        - name: Checkout code
                                                                                                                                uses: actions/checkout@v4
                                                                                                                                
                                                                                                                                      - name: Setup Go
                                                                                                                                              uses: actions/setup-go@v5
                                                                                                                                                      with:
                                                                                                                                                                go-version: '1.22'
                                                                                                                                                                
                                                                                                                                                                      - name: Build binary
                                                                                                                                                                              env:
                                                                                                                                                                                        GOOS: ${{ matrix.goos }}
                                                                                                                                                                                                  GOARCH: ${{ matrix.goarch }}
                                                                                                                                                                                                            CGO_ENABLED: 0
                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                              BINARY_NAME="cmd_exec_${{ matrix.goos }}_${{ matrix.goarch }}"
                                                                                                                                                                                                                                        if [ "${{ matrix.goos }}" = "windows" ]; then
                                                                                                                                                                                                                                                    BINARY_NAME="${BINARY_NAME}.exe"
                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                        go build -ldflags="-s -w" -o ${BINARY_NAME} .
                                                                                                                                                                                                                                                                                  echo "Built: ${BINARY_NAME}"
                                                                                                                                                                                                                                                                                            ls -la ${BINARY_NAME}
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                  - name: Upload artifact
                                                                                                                                                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                            name: cmd_exec_${{ matrix.goos }}_${{ matrix.goarch }}
                                                                                                                                                                                                                                                                                                                                      path: cmd_exec_${{ matrix.goos }}_${{ matrix.goarch }}*
                                                                                                                                                                                                                                                                                                                                      name: Build and Release
                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                      on:
                                                                                                                                                                                                                                                                                                                                        push:
                                                                                                                                                                                                                                                                                                                                            tags:
                                                                                                                                                                                                                                                                                                                                                  - 'v*'
                                                                                                                                                                                                                                                                                                                                                    workflow_dispatch:
                                                                                                                                                                                                                                                                                                                                                        inputs:
                                                                                                                                                                                                                                                                                                                                                              version:
                                                                                                                                                                                                                                                                                                                                                                      description: 'Release version (e.g., 1.0.4)'
                                                                                                                                                                                                                                                                                                                                                                              required: true
                                                                                                                                                                                                                                                                                                                                                                                      default: '1.0.4'
                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                      jobs:
                                                                                                                                                                                                                                                                                                                                                                                        build:
                                                                                                                                                                                                                                                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                strategy:
                                                                                                                                                                                                                                                                                                                                                                                                      matrix:
                                                                                                                                                                                                                                                                                                                                                                                                              goos: [linux, darwin, windows]
                                                                                                                                                                                                                                                                                                                                                                                                                      goarch: [amd64, arm64]
                                                                                                                                                                                                                                                                                                                                                                                                                              exclude:
                                                                                                                                                                                                                                                                                                                                                                                                                                        - goos: windows
                                                                                                                                                                                                                                                                                                                                                                                                                                                    goarch: arm64
                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                        steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Checkout code
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Setup Go
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    uses: actions/setup-go@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      go-version: '1.22'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Build binary
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              GOOS: ${{ matrix.goos }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        GOARCH: ${{ matrix.goarch }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  CGO_ENABLED: 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    BINARY_NAME="cmd_exec_${{ matrix.goos }}_${{ matrix.goarch }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ "${{ matrix.goos }}" = "windows" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          BINARY_NAME="${BINARY_NAME}.exe"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              go build -ldflags="-s -w" -o ${BINARY_NAME} .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "Built: ${BINARY_NAME}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ls -la ${BINARY_NAME}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: cmd_exec_${{ matrix.goos }}_${{ matrix.goarch }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: cmd_exec_${{ matrix.goos }}_${{ matrix.goarch }}*
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              release:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  needs: build
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          permissions:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                contents: write
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Download all artifacts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/download-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    path: binaries
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              merge-multiple: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: List artifacts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: ls -la binaries/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Create Release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: softprops/action-gh-release@v2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            tag_name: ${{ github.event.inputs.version || github.ref_name }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      name: Release ${{ github.event.inputs.version || github.ref_name }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                files: binaries/*
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          body: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ## exec-guard Release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              Pre-compiled binaries for multiple platforms:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - cmd_exec_linux_amd64 - Linux x64
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - cmd_exec_linux_arm64 - Linux ARM64
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - cmd_exec_darwin_amd64 - macOS x64
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - cmd_exec_darwin_arm64 - macOS ARM
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - cmd_exec_windows_amd64.exe - Windows x64
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
